<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }} — {{ site.description }}{% endif %}</title>
  {% if page.description %}<meta name="description" content="{{ page.description }}">{% else %}<meta name="description" content="{{ site.description }}">{% endif %}

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #b07820;
    --gold-dim: #8a5c10;
    --gold-glow: #d4a140;
    --ink: #2a1f4a;
    --ink-soft: #3a3060;
    --ink-softer: #4a3a6a;
    --subtle: #5a4a7a;
    --lavender: rgba(160, 130, 200, 0.3);
    --lavender-soft: rgba(160, 130, 200, 0.15);
  }

  html { scroll-behavior: smooth; }

  body {
    background: linear-gradient(160deg, #f0ebe8 0%, #e8dff5 25%, #d4e8f5 55%, #e8f0f8 100%);
    color: var(--ink);
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Starfield overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(180,150,220,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 8%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 40% 20%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 5%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 12%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 85% 18%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 92% 7%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 15% 35%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 30%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 78% 40%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 5% 50%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 35% 55%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 90% 55%, rgba(255,255,255,0.5) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  main { flex: 1; position: relative; z-index: 1; }

  a { color: var(--gold-dim); text-decoration: none; }
  a:hover { opacity: 0.8; }

  /* SITE HEADER */
  .site-header {
    position: relative;
    z-index: 10;
    padding: 20px 0;
    border-bottom: 1px solid var(--lavender-soft);
  }
  .site-header-inner {
    max-width: 860px;
    margin: 0 auto;
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
  }
  .site-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 400;
    color: var(--gold);
    letter-spacing: 4px;
    display: inline-flex;
    align-items: center;
    gap: 10px;
  }
  .site-logo-mark { color: var(--gold-glow); font-size: 14px; opacity: 0.8; }
  .site-nav {
    display: flex;
    gap: 28px;
    font-family: 'Jost', sans-serif;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .site-nav a {
    color: var(--subtle);
    font-weight: 400;
    padding: 4px 0;
    border-bottom: 1px solid transparent;
    transition: color .2s, border-color .2s;
  }
  .site-nav a:hover { color: var(--gold-dim); opacity: 1; }
  .site-nav a.is-active {
    color: var(--gold-dim);
    border-bottom-color: var(--gold);
  }

  /* PAGE */
  .page {
    max-width: 720px;
    margin: 0 auto;
    padding: 64px 24px;
    position: relative;
    z-index: 1;
    animation: fadeUp 0.8s ease both;
  }

  /* TYPOGRAPHY */
  h1, h2, h3, h4 {
    font-family: 'Cormorant Garamond', serif;
    color: var(--ink);
    font-weight: 400;
    letter-spacing: 1px;
  }
  h1 {
    font-size: 44px;
    margin-bottom: 18px;
    color: var(--gold);
    letter-spacing: 3px;
    font-weight: 300;
  }
  h2 {
    font-size: 28px;
    margin: 56px 0 16px;
    color: var(--ink);
    letter-spacing: 1.5px;
  }
  h3 {
    font-size: 20px;
    margin: 32px 0 10px;
    color: var(--gold-dim);
    letter-spacing: 1.5px;
  }
  p {
    margin-bottom: 18px;
    font-size: 15px;
    color: var(--ink-softer);
    line-height: 1.8;
    font-weight: 300;
  }
  ul, ol { margin: 0 0 18px 22px; color: var(--ink-softer); }
  li { margin-bottom: 10px; font-size: 15px; line-height: 1.75; }
  strong { color: var(--ink); font-weight: 500; }
  em { color: var(--ink-soft); }

  .eyebrow {
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #8a6020;
    margin-bottom: 16px;
    font-weight: 400;
  }
  .lede {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    color: var(--subtle);
    font-weight: 300;
    font-style: italic;
    margin-bottom: 32px;
    line-height: 1.6;
    letter-spacing: 0.5px;
  }
  .meta {
    font-size: 12px;
    color: var(--subtle);
    margin-bottom: 40px;
    font-style: italic;
    letter-spacing: 1px;
  }

  /* BUTTONS */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(176, 120, 32, 0.1);
    border: 1px solid rgba(176, 120, 32, 0.4);
    border-radius: 24px;
    padding: 10px 20px;
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    color: var(--gold-dim);
    letter-spacing: 1.5px;
    text-decoration: none;
    font-weight: 400;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s, transform 0.15s;
  }
  .btn:hover {
    background: rgba(176, 120, 32, 0.18);
    border-color: rgba(176, 120, 32, 0.6);
    opacity: 1;
    transform: translateY(-1px);
  }
  .btn-ghost {
    background: rgba(160, 130, 200, 0.08);
    border-color: var(--lavender);
    color: var(--subtle);
  }
  .btn-ghost:hover {
    background: rgba(160, 130, 200, 0.15);
    color: var(--ink-soft);
    border-color: rgba(160, 130, 200, 0.5);
  }

  /* APP LANDING */
  .app-hero {
    display: flex;
    gap: 32px;
    align-items: center;
    margin-bottom: 32px;
  }
  .app-hero-icon {
    width: 96px;
    height: 96px;
    border-radius: 22px;
    flex-shrink: 0;
    border: 1px solid rgba(232, 184, 75, 0.3);
    overflow: hidden;
    background: rgba(255, 255, 255, 0.4);
  }
  .app-hero-icon img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .app-hero-text h1 { margin-bottom: 6px; font-size: 40px; }
  .app-hero-text .lede { margin-bottom: 20px; font-size: 18px; }

  .feature-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 18px;
    margin: 32px 0;
  }
  .feature {
    padding: 22px;
    border: 1px solid var(--lavender);
    border-radius: 16px;
    background: rgba(255, 255, 255, 0.55);
    transition: border-color 0.3s, transform 0.3s;
  }
  .feature:hover {
    border-color: rgba(160, 100, 20, 0.4);
    transform: translateY(-2px);
  }
  .feature h4 {
    font-family: 'Cormorant Garamond', serif;
    color: var(--gold-dim);
    font-size: 18px;
    margin-bottom: 8px;
    font-weight: 500;
    letter-spacing: 0.5px;
  }
  .feature p { font-size: 13px; margin: 0; line-height: 1.65; }

  /* FAQ */
  .faq-item {
    border-bottom: 1px solid var(--lavender-soft);
    padding: 22px 0;
  }
  .faq-item summary {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    color: var(--ink);
    cursor: pointer;
    list-style: none;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: 400;
    letter-spacing: 0.5px;
    gap: 16px;
  }
  .faq-item summary::-webkit-details-marker { display: none; }
  .faq-item summary::after {
    content: '+';
    color: var(--gold);
    font-size: 22px;
    transition: transform .25s;
    flex-shrink: 0;
    font-weight: 300;
  }
  .faq-item[open] summary::after { transform: rotate(45deg); }
  .faq-item summary:hover { color: var(--gold-dim); }
  .faq-item > p, .faq-item > ul {
    margin-top: 12px;
    padding-right: 40px;
  }

  /* TOOL */
  .tool-panel {
    background: rgba(255, 255, 255, 0.55);
    border: 1px solid var(--lavender);
    border-radius: 20px;
    padding: 40px 32px;
    margin: 32px 0;
    text-align: center;
  }
  .tool-window {
    font-size: 11px;
    color: var(--subtle);
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .tool-time {
    font-family: 'Cormorant Garamond', serif;
    font-size: 48px;
    font-weight: 300;
    color: var(--gold);
    letter-spacing: 3px;
    margin: 14px 0 8px;
  }
  .tool-location {
    font-size: 12px;
    color: var(--gold-dim);
    margin-top: 20px;
    font-style: italic;
    letter-spacing: 0.5px;
  }
  .tool-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 20px;
  }
  .tool-row input {
    padding: 10px 16px;
    border: 1px solid var(--lavender);
    border-radius: 20px;
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    background: rgba(255, 255, 255, 0.6);
    color: var(--ink);
    font-weight: 300;
  }
  .tool-row input:focus {
    outline: none;
    border-color: rgba(176, 120, 32, 0.5);
  }

  /* BLOG LIST */
  .post-list { list-style: none; margin: 0; padding: 0; }
  .post-list li {
    padding: 0;
    border: 1px solid var(--lavender);
    border-radius: 16px;
    background: rgba(255, 255, 255, 0.55);
    margin-bottom: 16px;
    transition: border-color 0.3s, transform 0.3s;
  }
  .post-list li:hover {
    border-color: rgba(160, 100, 20, 0.4);
    transform: translateY(-2px);
  }
  .post-list a {
    display: block;
    padding: 22px 24px;
    color: inherit;
  }
  .post-list h3 {
    font-family: 'Cormorant Garamond', serif;
    margin: 0 0 6px;
    color: var(--gold-dim);
    font-size: 22px;
    font-weight: 500;
    letter-spacing: 0.5px;
  }
  .post-list p {
    margin: 0;
    font-size: 13px;
    color: var(--ink-soft);
  }

  /* CROSS-LINK CARD */
  .cross-card {
    background: rgba(255, 255, 255, 0.55);
    border: 1px solid rgba(176, 120, 32, 0.3);
    border-radius: 18px;
    padding: 24px;
    margin: 48px 0;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
  }
  .cross-card-text { flex: 1; min-width: 220px; }
  .cross-card-text strong {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 500;
    color: var(--ink);
    display: block;
    margin-bottom: 4px;
    letter-spacing: 0.5px;
  }
  .cross-card-text p {
    margin: 0;
    font-size: 13px;
    color: var(--subtle);
  }

  /* SITE FOOTER */
  .site-footer {
    border-top: 1px solid var(--lavender-soft);
    padding: 36px 24px;
    text-align: center;
    margin-top: 32px;
    position: relative;
    z-index: 1;
  }
  .footer-brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    color: var(--gold);
    letter-spacing: 3px;
    margin-bottom: 8px;
  }
  .footer-contact { font-size: 13px; color: var(--subtle); margin-bottom: 8px; }
  .footer-contact a { color: var(--gold-dim); opacity: 0.8; }
  .footer-contact a:hover { opacity: 1; }
  .footer-copy {
    font-size: 11px;
    color: rgba(90, 74, 122, 0.5);
    letter-spacing: 1px;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 640px) {
    h1 { font-size: 32px; letter-spacing: 2px; }
    h2 { font-size: 22px; }
    .site-header-inner { padding: 0 20px; flex-direction: column; gap: 12px; }
    .site-nav { gap: 18px; font-size: 10px; }
    .page { padding: 40px 20px; }
    .app-hero { flex-direction: column; align-items: flex-start; gap: 18px; }
    .app-hero-icon { width: 80px; height: 80px; }
    .app-hero-text h1 { font-size: 30px; }
    .tool-time { font-size: 36px; }
    .tool-panel { padding: 28px 20px; }
  }
</style>
</head>
<body>
  {% include header.html %}
  <main>
    {{ content }}
  </main>
  {% include footer.html %}
</body>
</html>
